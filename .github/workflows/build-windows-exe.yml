name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "excel_check_tool.py"
      - "generate_table_bs.py"
      - "excel_check_tool.spec"
      - "README.md"
      - "Nothing_You_Could_Do/**"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller pillow

      - name: Set package version
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          $sha = "${{ github.sha }}".Substring(0, 7)
          "PACKAGE_VERSION=$date-$sha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_EXE=表格核对工具-$date-$sha.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_ZIP=表格核对工具-windows-$date-$sha.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build EXE
        run: python -m PyInstaller --clean excel_check_tool.spec

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/表格核对工具.exe" "release/$env:PACKAGE_EXE"
          Copy-Item "README.md" "release/"
          Compress-Archive -Path "release/*" -DestinationPath "$env:PACKAGE_ZIP" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: table-check-tool-exe-${{ env.PACKAGE_VERSION }}
          path: release/${{ env.PACKAGE_EXE }}
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: table-check-tool-windows-package-${{ env.PACKAGE_VERSION }}
          path: ${{ env.PACKAGE_ZIP }}
          if-no-files-found: error
