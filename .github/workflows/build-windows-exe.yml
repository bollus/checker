name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "excel_check_tool.py"
      - "excel_check_tool.spec"
      - "README.md"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --clean excel_check_tool.spec

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/表格核对工具.exe" "release/"
          Copy-Item "README.md" "release/"
          Compress-Archive -Path "release/*" -DestinationPath "表格核对工具-windows.zip" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: table-check-tool-exe
          path: dist/表格核对工具.exe
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: table-check-tool-windows-package
          path: 表格核对工具-windows.zip
          if-no-files-found: error
