name: Build Tauri Desktop

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "src-tauri/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - "scripts/**"
      - "Nothing_You_Could_Do/**"
      - ".github/workflows/build-tauri-desktop.yml"

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          node scripts/resolve-release-version.mjs "$latest_tag"

      - name: Show release version
        run: echo "Release ${{ steps.version.outputs.tag }}"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Apply release version
        run: node scripts/set-version.mjs ${{ needs.prepare-release.outputs.version }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Cache Tauri tools
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri
          key: tauri-tools-windows-${{ hashFiles('src-tauri/tauri.conf.json', 'package-lock.json') }}
          restore-keys: |
            tauri-tools-windows-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Remove stale Python and helper build artifacts
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue dist-sidecar
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue src-tauri/target/release/dist-sidecar
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue src-tauri/target/release/python_backend
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue src-tauri/target/release/_up_/dist-sidecar
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue src-tauri/target/release/_up_/python_backend
          Remove-Item -Force -ErrorAction SilentlyContinue src-tauri/target/release/_up_/excel_check_tool.py
          Remove-Item -Force -ErrorAction SilentlyContinue src-tauri/target/release/_up_/generate_table_bs.py
          Remove-Item -Force -ErrorAction SilentlyContinue src-tauri/target/release/rust_check_cli.exe
          Remove-Item -Force -ErrorAction SilentlyContinue src-tauri/target/release/rust_generate_cli.exe

      - name: Build Windows app
        run: npm run tauri:build -- --bundles nsis

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: excel-check-tool-windows-${{ needs.prepare-release.outputs.version }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Apply release version
        run: node scripts/set-version.mjs ${{ needs.prepare-release.outputs.version }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Cache Tauri tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/tauri
            ~/Library/Caches/tauri
          key: tauri-tools-macos-${{ hashFiles('src-tauri/tauri.conf.json', 'package-lock.json') }}
          restore-keys: |
            tauri-tools-macos-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Remove stale Python and helper build artifacts
        run: |
          rm -rf dist-sidecar src-tauri/target/release/dist-sidecar src-tauri/target/release/python_backend
          rm -rf src-tauri/target/release/_up_/dist-sidecar src-tauri/target/release/_up_/python_backend
          rm -f src-tauri/target/release/_up_/excel_check_tool.py src-tauri/target/release/_up_/generate_table_bs.py
          rm -f src-tauri/target/release/rust_check_cli src-tauri/target/release/rust_generate_cli

      - name: Build macOS app
        run: npm run tauri:build -- --bundles dmg,app

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: excel-check-tool-macos-${{ needs.prepare-release.outputs.version }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-windows
      - build-macos

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: 表格核对工具 ${{ needs.prepare-release.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.app.tar.gz
